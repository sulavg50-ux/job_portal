<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS (Optional but looks good) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include 'navbar.html'%}

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">User Registration Form</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}
            
            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- City -->
            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" placeholder="Enter your city" required>
            </div>

            <!-- Age -->
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter your age" min="1" required>
            </div><div class="mb-3">

                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" min="1" required>
            </div>

            <!-- Study -->
            <div class="mb-3">
                <label class="form-label">Study</label>
                <select name="study" class="form-select" required>
                    <option value="">-- Select Study --</option>
                    <option value="BIT">BIT</option>
                    <option value="BCA">BCA</option>
                    <option value="BBS">BBS</option>
                    <option value="BSc">BSc</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- Submit Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
        <p class="mt-3 text-center">
            Do you have an account? <a href="{% url 'user_log' %}">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
