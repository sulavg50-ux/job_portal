<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    

    <h2>Welcome {{ user.user_name }}</h2>
    <p class="text-muted">Find your dream job here 🚀</p>

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <div class="card shadow p-3 text-center">
                <h5>Total Applications</h5>
                <h3 class="text-primary">{{ total_applications }}</h3>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow p-3 text-center">
                <h5>Pending</h5>
                <h3 class="text-warning">{{ pending }}</h3>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow p-3 text-center">
                <h5>Accepted</h5>
                <h3 class="text-success">{{ accepted }}</h3>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="#" class="btn btn-primary">Browse Jobs</a>
        <a href="#" class="btn btn-success">My Applications</a>
        <a href="#" class="btn btn-warning">Edit Profile</a>
        <a href="{% url 'home'%}" class="btn btn-danger"onclick="return confirm('Are you sure you want to logout?');">Logout</a>
    </div>

</div>

</body>
</html>
