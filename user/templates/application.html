<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f4f6f9;">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Apply for Job</h3>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <!-- IMPORTANT: add enctype for file upload -->
        <form method="POST" enctype="multipart/form-data">
            
            <!-- Django CSRF Token -->
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Select Job</label>
                <select name="job_id" class="form-select" required>
                    <option value="">Choose a job...</option>
                    {% for job in jobs %}
                        <option value="{{ job.id }}">{{ job.job_title }} - {{ job.company_name }} ({{ job.location }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" placeholder="Enter your city" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Study / Qualification</label>
                <input type="text" name="study" class="form-control" placeholder="BIT / BCA / BSc / etc." required>
            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label>
                <textarea name="skills" class="form-control" rows="3" placeholder="Python, Django, HTML, CSS..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Resume (PDF/DOC)</label>
                <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Submit Application</button>
                <a href="{% url 'user_dash' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
